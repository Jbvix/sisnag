<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SISNAG — Rebocador IA</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    #map { height: 100vh; width: 100vw; }
  </style>
</head>
<body>
  <div id="map"></div>

  <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.82); color:white; padding:12px 14px; border-radius:10px; font-size:14px; max-width: min(92vw, 360px);">
    <div>🌐 Starlink: <span id="status">Conectado</span></div>
    <div id="sensors-status">📍 GPS: aguardando…</div>
    <button type="button" id="btn-screenshot" style="margin-top:10px; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; font-weight:600;">
      📸 Analisar display MCPS/MTU
    </button>
  </div>

  <div id="chat" style="position:absolute; bottom:10px; right:10px; width:min(96vw, 380px); height:min(52vh, 520px); background:rgba(255,255,255,0.96); border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.35); display:flex; flex-direction:column;"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/js/sensors.js"></script>
  <script src="/js/chat.js"></script>
  <script src="/js/camera-upload.js"></script>
  <script src="/js/main.js"></script>
  <script>
    document.getElementById('btn-screenshot').addEventListener('click', function () {
      if (typeof window.captureScreenshot === 'function') window.captureScreenshot();
    });
  </script>
</body>
</html>
